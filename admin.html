<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bếp & Điều Phối - Vua Heo Tộc</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #121212;
      --bg-col: #1a1a1a;
      --bg-card: #242424;
      --text-main: #f5f5f5;
      --text-muted: #a0a0a0;
      
      --c-pending: #f39c12; /* Cam - Phiếu mới */
      --c-cooking: #3498db; /* Xanh dương - Đang nấu */
      --c-completed: #2ecc71; /* Xanh lá - Hoàn thành */
      --c-danger: #e74c3c; /* Đỏ - Hủy */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* LOGIN OVERLAY */
    #login-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      gap: 20px;
    }

    .login-box {
      background: var(--bg-col);
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid #333;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .btn-login {
      background: #fff;
      color: #000;
      padding: 12px 24px;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      border: none;
      font-size: 1rem;
    }

    /* HEADER */
    .admin-header {
      background: #0a0a0a;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
      height: 70px;
      flex-shrink: 0;
    }

    .admin-header h1 {
      font-size: 1.4rem;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .admin-header h1 span {
      color: var(--c-pending);
    }

    .header-actions {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: var(--c-completed);
      background: rgba(46, 204, 113, 0.1);
      padding: 6px 12px;
      border-radius: 20px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background-color: var(--c-completed);
      border-radius: 50%;
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .btn-clear {
      background: transparent;
      border: 1px solid var(--c-danger);
      color: var(--c-danger);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }

    .btn-clear:hover {
      background: var(--c-danger);
      color: #fff;
    }

    /* KANBAN BOARD */
    .board {
      display: flex;
      flex: 1;
      padding: 20px;
      gap: 20px;
      overflow-x: auto;
      height: calc(100vh - 70px);
    }

    .column {
      flex: 1;
      min-width: 320px;
      background: var(--bg-col);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      border: 1px solid #2a2a2a;
      overflow: hidden;
    }

    .column-header {
      padding: 15px 20px;
      font-weight: 700;
      font-size: 1.1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid;
      background: #111;
    }

    .col-pending .column-header { border-bottom-color: var(--c-pending); color: var(--c-pending); }
    .col-cooking .column-header { border-bottom-color: var(--c-cooking); color: var(--c-cooking); }
    .col-completed .column-header { border-bottom-color: var(--c-completed); color: var(--c-completed); }

    .count-badge {
      background: rgba(255,255,255,0.1);
      color: #fff;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.9rem;
    }

    .column-body {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    /* Custom Scrollbar for columns */
    .column-body::-webkit-scrollbar { width: 6px; }
    .column-body::-webkit-scrollbar-track { background: transparent; }
    .column-body::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

    /* ORDER CARD */
    .order-card {
      background: var(--bg-card);
      border-radius: 6px;
      padding: 15px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      border-left: 4px solid transparent;
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .col-pending .order-card { border-left-color: var(--c-pending); }
    .col-cooking .order-card { border-left-color: var(--c-cooking); }
    .col-completed .order-card { border-left-color: var(--c-completed); opacity: 0.8; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px dashed #444;
      padding-bottom: 8px;
    }

    .order-id {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
    }

    .order-time {
      font-size: 0.85rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .customer-info {
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .customer-info strong {
      color: #fff;
      font-size: 1rem;
    }

    .customer-info .phone {
      color: var(--c-cooking);
      font-weight: 600;
    }

    .order-items {
      background: #1a1a1a;
      padding: 10px;
      border-radius: 4px;
      font-size: 0.95rem;
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .item-row:last-child { margin-bottom: 0; }

    .item-qty {
      font-weight: 700;
      color: var(--c-pending);
      margin-right: 8px;
    }

    .order-total {
      text-align: right;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--c-completed);
      margin-top: 5px;
    }

    .card-actions {
      display: flex;
      gap: 10px;
      margin-top: 5px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 4px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn:active { transform: translateY(1px); }

    .btn-primary { background: var(--c-cooking); color: #fff; }
    .btn-success { background: var(--c-completed); color: #fff; }
    .btn-danger { background: rgba(231, 76, 60, 0.1); color: var(--c-danger); }
    .btn-danger:hover { background: var(--c-danger); color: #fff; }
    .btn-outline { background: transparent; border: 1px solid #555; color: #ccc; }
    .btn-outline:hover { background: #333; color: #fff; }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      margin-top: 40px;
      font-size: 0.95rem;
    }

  </style>
</head>
<body>

  <div id="login-overlay">
    <div class="login-box">
      <h2 style="margin-bottom: 20px;">Hệ Thống Nội Bộ Vua Heo Tộc</h2>
      <p style="color: var(--text-muted); margin-bottom: 30px;">Vui lòng đăng nhập bằng tài khoản quản trị để tiếp nhận đơn hàng.</p>
      <button class="btn-login" id="google-login-btn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
        Đăng nhập với Google
      </button>
      <div id="login-error" style="color: var(--c-danger); margin-top: 20px; font-size: 0.9rem; display: none;"></div>
    </div>
  </div>

  <header class="admin-header">
    <h1><span>🔥</span> Bếp & Điều Phối Đơn Hàng</h1>
    <div class="header-actions">
      <div id="user-display" style="font-size: 0.85rem; color: var(--text-muted);"></div>
      <div class="live-indicator">
        <div class="live-dot"></div>
        Live Sync
      </div>
      <button class="btn-clear" onclick="handleLogout()">Đăng Xuất</button>
    </div>
  </header>

  <div class="board">
    <!-- CỘT 1: PHIẾU MỚI -->
    <div class="column col-pending">
      <div class="column-header">
        Phiếu Mới (Chờ Nhận)
        <span class="count-badge" id="count-pending">0</span>
      </div>
      <div class="column-body" id="list-pending">
        <!-- Cards go here -->
      </div>
    </div>

    <!-- CỘT 2: ĐANG NẤU -->
    <div class="column col-cooking">
      <div class="column-header">
        Đã Nhận (Đang Nấu)
        <span class="count-badge" id="count-cooking">0</span>
      </div>
      <div class="column-body" id="list-cooking">
        <!-- Cards go here -->
      </div>
    </div>

    <!-- CỘT 3: HOÀN THÀNH -->
    <div class="column col-completed">
      <div class="column-header">
        Hoàn Thành (Chờ Giao)
        <span class="count-badge" id="count-completed">0</span>
      </div>
      <div class="column-body" id="list-completed">
        <!-- Cards go here -->
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA1_wtKUP6rCD5rdAAk7R-OWq-pm7w956U",
      authDomain: "vua-heo-toc-system.firebaseapp.com",
      projectId: "vua-heo-toc-system",
      storageBucket: "vua-heo-toc-system.firebasestorage.app",
      messagingSenderId: "631022163905",
      appId: "1:631022163905:web:22f6046f403b916ffec140",
      measurementId: "G-3F2Z2XR0ZJ"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Error Handling
    const OperationType = {
      CREATE: 'create',
      UPDATE: 'update',
      DELETE: 'delete',
      LIST: 'list',
      GET: 'get',
      WRITE: 'write',
    };

    function handleFirestoreError(error, operationType, path) {
      const errInfo = {
        error: error instanceof Error ? error.message : String(error),
        authInfo: {
          userId: auth.currentUser?.uid,
          email: auth.currentUser?.email,
          emailVerified: auth.currentUser?.emailVerified,
        },
        operationType,
        path
      };
      console.error('Firestore Error: ', JSON.stringify(errInfo));
      
      if (error.code === 'permission-denied') {
        alert('Bạn không có quyền thực hiện thao tác này. Vui lòng kiểm tra lại tài khoản quản trị.');
      }
    }

    // Auth Logic
    document.getElementById('google-login-btn').onclick = async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch (error) {
        console.error("Login Error:", error);
        document.getElementById('login-error').innerText = "Lỗi đăng nhập: " + error.message;
        document.getElementById('login-error').style.display = 'block';
      }
    };

    window.handleLogout = () => {
      signOut(auth);
    };

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('user-display').innerText = user.email;
        initRealtimeOrders();
      } else {
        document.getElementById('login-overlay').style.display = 'flex';
      }
    });

    // Realtime Orders Logic
    let unsubscribe = null;

    function initRealtimeOrders() {
      if (unsubscribe) unsubscribe();

      const q = query(collection(db, "orders"), orderBy("timestamp", "desc"));
      
      unsubscribe = onSnapshot(q, (snapshot) => {
        const orders = [];
        snapshot.forEach((doc) => {
          orders.push({ id: doc.id, ...doc.data() });
        });
        renderOrders(orders);
      }, (error) => {
        handleFirestoreError(error, OperationType.LIST, 'orders');
      });
    }

    function renderOrders(orders) {
      const pending = orders.filter(o => o.status === 'pending');
      const cooking = orders.filter(o => o.status === 'cooking');
      const completed = orders.filter(o => o.status === 'completed');

      document.getElementById('count-pending').innerText = pending.length;
      document.getElementById('count-cooking').innerText = cooking.length;
      document.getElementById('count-completed').innerText = completed.length;

      renderColumn('list-pending', pending, 'pending');
      renderColumn('list-cooking', cooking, 'cooking');
      renderColumn('list-completed', completed, 'completed');
    }

    function renderColumn(elementId, ordersList, type) {
      const container = document.getElementById(elementId);
      
      if (ordersList.length === 0) {
        container.innerHTML = `<div class="empty-state">Không có đơn nào</div>`;
        return;
      }

      // Sort logic
      if (type === 'completed') {
        ordersList.sort((a, b) => b.timestamp - a.timestamp);
      } else {
        ordersList.sort((a, b) => a.timestamp - b.timestamp);
      }
      
      container.innerHTML = ordersList.map(order => {
        const itemsHtml = order.items.map(i => `
          <div class="item-row">
            <div><span class="item-qty">${i.qty}x</span> ${i.name}</div>
          </div>
        `).join('');

        let actionButtons = '';
        if (type === 'pending') {
          actionButtons = `
            <button class="btn btn-primary" onclick="window.updateStatus('${order.id}', 'cooking')">Nhận Đơn (Nấu)</button>
            <button class="btn btn-danger" onclick="window.updateStatus('${order.id}', 'cancelled')">Hủy</button>
          `;
        } else if (type === 'cooking') {
          actionButtons = `
            <button class="btn btn-success" onclick="window.updateStatus('${order.id}', 'completed')">Xong (Chờ Giao)</button>
          `;
        } else if (type === 'completed') {
          actionButtons = `
            <button class="btn btn-outline" onclick="window.removeOrder('${order.id}')">Xóa Khỏi Bảng</button>
          `;
        }

        return `
          <div class="order-card">
            <div class="card-header">
              <div class="order-id">#${order.id.substring(0,6)}</div>
              <div class="order-time">🕒 ${formatTime(order.timestamp)}</div>
            </div>
            
            <div class="customer-info">
              <strong>${order.customerName}</strong><br>
              <span class="phone">📞 ${order.customerPhone}</span><br>
              <span style="color: var(--text-muted)">📍 ${order.customerAddress}</span>
            </div>

            <div class="order-items">
              ${itemsHtml}
            </div>
            
            <div class="order-total">${order.totalPriceText}</div>
            
            <div class="card-actions">
              ${actionButtons}
            </div>
          </div>
        `;
      }).join('');
    }

    window.updateStatus = async (orderId, newStatus) => {
      try {
        const orderRef = doc(db, "orders", orderId);
        await updateDoc(orderRef, { 
          status: newStatus,
          timestamp: newStatus === 'completed' ? Date.now() : Date.now() // Keep it updated for sorting
        });
      } catch (error) {
        handleFirestoreError(error, OperationType.UPDATE, `orders/${orderId}`);
      }
    };

    window.removeOrder = async (orderId) => {
      if (!confirm('Xóa đơn hàng này khỏi hệ thống?')) return;
      try {
        await deleteDoc(doc(db, "orders", orderId));
      } catch (error) {
        handleFirestoreError(error, OperationType.DELETE, `orders/${orderId}`);
      }
    };

    function formatTime(timestamp) {
      const d = new Date(timestamp);
      return d.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
    }

  </script>
</body>
</html>
